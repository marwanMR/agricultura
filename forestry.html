<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>علم الغابات - الفرقة التانية زراعة</title>
  <link rel="icon" href="https://i.postimg.cc/k5TtVWJL/Picsart-26-05-24-01-26-07-243.png">
  <style>
    :root{
      --green:#1f7a4c;--green-dark:#0f4d2a;--bg:#e8f5e9;--card:#fff;--text:#1f2937;--shadow:rgba(0,0,0,.1)
    }
    [data-theme="dark"]{
      --green:#2ecc71;--green-dark:#1e8449;--bg:#121212;--card:#1e1e1e;--text:#e0e0e0;--shadow:rgba(0,0,0,.3)
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Cairo',sans-serif;background:var(--bg);background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" opacity="0.04"><path fill="%231f7a4c" d="M20 20 Q40 5 60 20 T100 20 V100 H0 Z"/></svg>');background-size:100px 100px;color:var(--text);min-height:100vh;transition:.3s}
    
    .cover-header{position:relative;width:100%;height:300px;background:#000} 
    .cover-header img{width:100%;height:100%;object-fit:cover}
    .cover-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,rgba(0,0,0,.15),rgba(0,0,0,.55))}
    .cover-content{position:absolute;bottom:20px;right:20px;left:20px;color:#fff;text-align:right}
    .cover-content h1{font-size:1.9rem;text-shadow:0 2px 10px #000;margin-bottom:12px}
    .back-btn{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.2);backdrop-filter:blur(5px);color:#fff;padding:8px 15px;border-radius:8px;text-decoration:none;font-weight:700;transition:.2s;border:1px solid rgba(255,255,255,.3)}
    .back-btn:hover{background:rgba(255,255,255,.3)}

    .top-bar{display:flex;justify-content:center;gap:15px;margin-top:20px;flex-wrap:wrap}
    .btn{background:linear-gradient(180deg,var(--green),var(--green-dark));color:#fff;padding:12px 22px;border-radius:12px;text-decoration:none;font-size:.95rem;font-weight:700;display:inline-flex;flex-direction:column;align-items:center;gap:5px;box-shadow:0 4px 0 var(--green-dark);transition:.1s;border:none;cursor:pointer;min-width:150px}
    .btn:active{transform:translateY(4px);box-shadow:0 0 0 var(--green-dark)}
    .btn svg{width:22px;height:22px;fill:#fff}
    
    .btn-whatsapp{background:linear-gradient(180deg,#25D366,#128C7E);box-shadow:0 4px 0 #128C7E}
    .btn-theme{background:linear-gradient(180deg,var(--green),var(--green-dark));border:none;box-shadow:0 4px 0 var(--green-dark)}

    .container{max-width:900px;margin:0 auto;padding:30px 20px}
    .grid{display:grid;grid-template-columns:repeat(3, 1fr);gap:20px}
    @media (max-width: 768px){.grid{grid-template-columns:repeat(2, 1fr)}}
    @media (max-width: 480px){.grid{grid-template-columns:1fr}}

    .card-material{background:var(--card);border-radius:18px;padding:20px;text-align:center;box-shadow:0 8px 15px var(--shadow),inset 0 -3px 0 var(--green-dark);transition:.2s;border-top:4px solid var(--green);display:flex;flex-direction:column;gap:12px}
    .card-material:hover{transform:translateY(-6px)}
    .card-icon{font-size:3rem;margin-bottom:5px}
    .card-material h3{color:var(--green-dark);font-size:1.3rem}
    .card-material p{color:var(--text);opacity:.7;font-size:.9rem}
    .btn-main{background:linear-gradient(180deg,var(--green),var(--green-dark));color:#fff;padding:12px 20px;border-radius:10px;text-decoration:none;font-size:1rem;font-weight:700;box-shadow:0 3px 0 var(--green-dark);transition:.1s;margin-top:auto}
    .btn-main:active{transform:translateY(3px);box-shadow:0 0 0 var(--green-dark)}

    footer{text-align:center;padding:30px 20px;color:var(--green-dark);font-size:.9rem;font-weight:600}
  </style>
</head>
<body>
  <header class="cover-header">
    <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1920&auto=format&fit=crop" alt="Cover"> <!-- صورة غابة 4K مؤقتة -->
    <div class="cover-overlay"></div>
    <div class="cover-content">
      <h1>الغابات 🌳</h1>
      <a href="term1.html" class="back-btn">← رجوع للمواد</a>
    </div>
  </header>

  <div class="container">
    <div class="top-bar">
      <button class="btn btn-theme" id="themeBtn">
        <svg id="themeIcon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <span id="themeText">تفعيل الوضع الليلي</span>
      </button>
      <a href="https://wa.me/201229816812" target="_blank" class="btn btn-whatsapp">
        <svg viewBox="0 0 24 24"><path d="M20.52 3.48A11.86 11.86 0 0 0 12 .25 11.75 11.75 0 0 0 .25 12a11.6 11.6 0 0 0 1.6 5.82L0 24l6.3-1.65A11.74 11.74 0 0 0 12 23.75 11.86 11.86 0 0 0 20.52 3.48m-8.52 18.3a9.72 9.72 0 0 1-4.95-1.35l-.35-.2-3.74.98.99-3.63-.23-.38a9.7 9.7 0 0 1-1.5-5.2 9.75 9.75 0 0 1 16.4-7.08 9.75 9.75 0 0 1-6.62 16.76m5.38-7.3c-.3-.15-1.76-.87-2.03-.97s-.47-.15-.67.15-.76.97-.94 1.17-.35.22-.64.07a7.88 7.88 0 0 1-3.5-3.08c-.26-.45.26-.42.74-1.39a.64.64 0 0 0 0-.6c-.07-.15-.67-1.62-.92-2.22s-.48-.5-.67-.5h-.57a1.1 1 0 0 0-.8.38 3.36 3.36 0 0 0-1.05 2.5 5.9 5.9 0 0 0 1.22 3.1c.15.25 2.1 3.2 5.1 4.5.7.3 1.25.48 1.68.62.7.22 1.34.19 1.85.12.56-.08 1.76-.72 2-1.42s.26-1.3.18-1.42-.3-.23-.6-.38"/></svg>
        <span>التواصل مع الدعم</span>
      </a>
    </div>

    <div class="grid" style="margin-top:25px;">
      <div class="card-material">
        <div class="card-icon">📖</div>
        <h3>محاضرات</h3>
        <p>كل محاضرات المادة PDF</p>
        <a href="forests/lectures.html" class="btn-main">فتح</a> <!-- غيرت micro لـ forests -->
      </div>

      <div class="card-material">
        <div class="card-icon">✏️</div>
        <h3>سكاشن</h3>
        <p>سكاشن العملي والشرح</p>
        <a href="forests/sections.html" class="btn-main">فتح</a>
      </div>

      <div class="card-material">
        <div class="card-icon">📝</div>
        <h3>ملخصات</h3>
        <p>ملخصات ومراجعات نهائية</p>
        <a href="forests/summaries.html" class="btn-main">فتح</a>
      </div>
    </div>
  </div>

  <footer>اتعمل بحب لطلبة زراعة 💚 <br>تصميم وبرمجة: مروان محمد © 2026</footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('themeBtn');
      const icon = document.getElementById('themeIcon');
      const text = document.getElementById('themeText');
      const html = document.documentElement;
      
      function setTheme(theme) {
        html.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        if (theme === 'dark') {
          icon.innerHTML = '<path d="M12 3a1 1 0 0 1 1 1v2a1 1 0 1 1-2 0V4a1 1 0 0 1 1-1m0 14a1 1 0 0 1 1 1v2a1 1 0 1 1-2 0v-2a1 1 0 0 1 1-1M4.22 5.64a1 1 0 0 1 1.42 0l1.42 1.42a1 1 0 0 1-1.42 1.42L4.22 7.06a1 1 0 0 1 0-1.42m12.02 12.02a1 1 0 0 1 1.42 0l1.42 1.42a1 1 0 0 1-1.42 1.42l-1.42-1.42a1 1 0 0 1 0-1.42M3 12a1 1 0 0 1 1-1h2a1 1 0 1 1 0 2H4a1 1 0 0 1-1-1m16 0a1 1 0 0 1 1-1h2a1 1 0 1 1 0 2h-2a1 1 0 0 1-1-1M5.64 18.36a1 1 0 0 1 0-1.42l1.42-1.42a1 1 0 1 1 1.42 1.42l-1.42 1.42a1 1 0 0 1-1.42 0m12.02-12.02a1 1 0 0 1 0-1.42l1.42-1.42a1 1 0 1 1 1.42 1.42l-1.42 1.42a1 1 0 0 1-1.42 0M12 8a4 4 0 1 1 0 8 4 4 0 0 1 0-8z"/>';
          text.textContent = 'إلغاء تفعيل الوضع الليلي';
        } else {
          icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
          text.textContent = 'تفعيل الوضع الليلي';
        }
      }
      const savedTheme = localStorage.getItem('theme') || 'light';
      setTheme(savedTheme);
      btn.onclick = () => setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });
  </script>
</body>
</html>
